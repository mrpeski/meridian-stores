name: Destroy AWS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DESTROY to delete the AWS application stack.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.MERIDIAN_STORES_AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.MERIDIAN_STORES_AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
  TF_STATE_BUCKET: ${{ vars.MERIDIAN_STORES_TF_STATE_BUCKET || vars.TF_STATE_BUCKET }}
  TF_VAR_project: ${{ vars.MERIDIAN_STORES_PROJECT || 'meridian-stores' }}
  TF_VAR_aws_region: ${{ vars.MERIDIAN_STORES_AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_cors_allow_origin: ${{ vars.MERIDIAN_STORES_CORS_ALLOW_ORIGIN || vars.CORS_ALLOW_ORIGIN || '*' }}
  TF_VAR_clerk_enabled: ${{ vars.MERIDIAN_STORES_CLERK_ENABLED || 'false' }}
  TF_VAR_clerk_issuer: ${{ vars.MERIDIAN_STORES_CLERK_ISSUER || vars.CLERK_ISSUER || '' }}
  TF_VAR_clerk_jwks_url: ${{ vars.MERIDIAN_STORES_CLERK_JWKS_URL || vars.CLERK_JWKS_URL || '' }}
  TF_VAR_secret_env_vars: ${{ secrets.MERIDIAN_STORES_SECRET_ENV_VARS_JSON || '{}' }}

jobs:
  destroy:
    name: Destroy application stack
    runs-on: ubuntu-latest
    steps:
      - name: Confirm destroy
        run: |
          test "${{ inputs.confirm }}" = "DESTROY" || {
            echo "Destroy not confirmed. Re-run and type DESTROY." >&2
            exit 1
          }
          test -n "${TF_STATE_BUCKET}" || {
            echo "Set MERIDIAN_STORES_TF_STATE_BUCKET or TF_STATE_BUCKET in repository variables." >&2
            exit 1
          }
          test -n "${AWS_ROLE_TO_ASSUME}" || {
            echo "Set MERIDIAN_STORES_AWS_ROLE_TO_ASSUME or AWS_ROLE_TO_ASSUME in repository variables." >&2
            exit 1
          }

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Initialize Terraform
        working-directory: infra/aws
        run: |
          cp backend.tf.example backend.tf
          terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="region=${AWS_REGION}"

      - name: Destroy AWS application stack
        working-directory: infra/aws
        run: terraform destroy -auto-approve
